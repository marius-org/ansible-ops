name: Build & Deploy Ansible Ops

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k3s/**'
      - 'README.md'
      - '*.md'

jobs:
  build-and-push:
    runs-on: control-node

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            mariuseu/ansible-ops:latest
            mariuseu/ansible-ops:${{ env.IMAGE_TAG }}

      - name: Update image tag in manifest
        run: |
          sed -i "s|mariuseu/ansible-ops:.*|mariuseu/ansible-ops:${{ env.IMAGE_TAG }}|g" \
            k3s/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k3s/deployment.yaml
          git commit -m "Update ansible-ops image to ${{ env.IMAGE_TAG }} [skip ci]"
          git push