apiVersion: apps/v1
kind: Deployment
metadata:
  name: ansible-ops
  namespace: ansible-ops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ansible-ops
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ansible-ops
    spec:
      containers:
        - name: ansible-ops
          image: mariuseu/ansible-ops:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ansible-secret
                  key: DATABASE_URL
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ansible-ops-service
  namespace: ansible-ops
spec:
  type: NodePort
  selector:
    app: ansible-ops
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 32528
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ansible-ops-ingress
  namespace: ansible-ops
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: ansible.slax.ro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ansible-ops-service
                port:
                  number: 8000
